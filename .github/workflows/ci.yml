name: CI

on:
  push:
    branches: [main, develop, "DOM-*"]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app/ training/ tests/
      - name: Format check
        run: ruff format --check app/ training/ tests/
      - name: Tests
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          push: false
          tags: colombolabs/movicol-ai:latest
